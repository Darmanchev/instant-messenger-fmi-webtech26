<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sign up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles/style.css">
</head>
<body>
    <main class="container">
        <div class="card auth-card">
            <h3 class="text-center mb-4">Sign up</h3>

            <div class="alert alert-danger d-none" id="errorMsg"></div>

            <form id="registerForm">
                <div class="mb-3">
                    <input type="text" class="form-control" id="username"
                           placeholder="Username" required minlength="3" maxlength="20">
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" id="email"
                           placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" id="password"
                           placeholder="Create password" required minlength="4">
                </div>
                <button type="submit" class="btn btn-success w-100" id="submitBtn">
                    Sign up
                </button>
            </form>

            <div class="text-center mt-3">
                Already have an account?
                <a href="/login" class="text-decoration-none">Sign in</a>
            </div>
        </div>
    </main>
    <script src="/static/scripts/register.js"></script>
</body>
</html>
