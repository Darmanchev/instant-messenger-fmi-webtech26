<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <main class="container">
        <div class="card auth-card">
            <h3 class="text-center mb-4">Регистрация</h3>
            <form action="chat.html">
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Потребителско име" required>
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" placeholder="Имейл" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Създайте парола" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Регистрирай се</button>
            </form>
            <div class="text-center mt-3">
                Вече имате акаунт?
                <a href="login.html" class="text-decoration-none"> Влезте</a>
            </div>
        </div>
    </main>
</body>
</html>
