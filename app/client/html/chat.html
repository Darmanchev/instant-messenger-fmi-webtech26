<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestMessenger - Chats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/styles/style.css">
</head>
<body>
    <!--modal window for create channel-->
    <div class="modal fade" id="createChannelModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create channel</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control" id="newChannelName"
                           placeholder="channel-name" minlength="2" maxlength="50">
                    <div class="text-danger small mt-1" id="channelError"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary"
                            data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary"
                            onclick="createChannel()">Create</button>
                </div>
            </div>
        </div>
    </div>

<!--navbar-->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-chat-dots-fill me-2"></i>BestMessenger</a>

        <div class="d-flex align-items-center">
            <span class="navbar-text text-white me-3 d-none d-md-block">
                Log in as: <strong id="currentUsername"></strong>
            </span>
            <button onclick="logout()" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i> Exit
            </button>
        </div>
    </div>
</nav>

<!--main content-->
<main class="container-fluid chat-container shadow-lg border-0">
    <div class="row h-100 g-0">
        <!--sidebar-->
        <div class="col-md-4 col-lg-3 border-end bg-white d-flex flex-column">
            <div class="p-3 bg-light border-bottom">
                <input type="text" class="form-control form-control-sm"
                         id="channelSearch"
                         placeholder="Search channels..."
                         oninput="filterChannels(this.value)">
            </div>
            <button class="btn btn-secondary btn-sm w-98 me-2 mt-2 mb-2" data-bs-toggle="modal" data-bs-target="#createChannelModal">
                    <i class="bi bi-plus-lg me-1"></i>New channel
            </button>
            <!--list of channels-->
            <div class="list-group list-group-flush overflow-auto me-2 rounded-1" id="channelsList">
            </div>
        </div>

        <!--chat area-->
        <div class="col-md-8 col-lg-9 d-flex flex-column bg-white">
            <!--chat header-->
            <div class="p-3 border-bottom d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <span id="headerIcon" class="fs-5 me-2"></span>
                    <h6 class="mb-0" id="headerName">—</h6>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <!-- search in channel -->
                    <div class="input-group input-group-sm" style="width: 220px;">
                        <input type="text" class="form-control" id="messageSearch" placeholder="Search in channel..."
                               oninput="searchMessages(this.value)">
                        <button class="btn btn-outline-secondary" onclick="clearSearch()">
                                <i class="bi bi-x"></i>
                        </button>
                    </div>
                    <!-- delete channel -->
                    <button class="btn btn-link text-danger p-0" onclick="deleteChannel()">
                            <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
            <!--messages area-->
            <div class="messages-area flex-grow-1 p-4 overflow-auto">
                <div class="d-flex flex-column gap-3" id="messagesContainer"></div>
            </div>
            <!--output area -->
            <div class="p-3 border-top bg-light">
                <div class="input-group">
                    <input type="text" class="form-control border-0 bg-white rounded-1 me-2" id="msgInput" placeholder="Write a message..."
                    onkeydown="if (event.key === 'Enter') sendMessage()">
                    <button class="btn btn-primary px-4" onclick="sendMessage()">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/scripts/chat.js"></script>
</body>
</html>
