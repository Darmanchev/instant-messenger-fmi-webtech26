services:
  main-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: instantmessenger_app
    ports:
      - "8088:8000"
    command: "uvicorn backend.main:app --reload --host 0.0.0.0 --port 8000"
    env_file:
      - ../.env
    volumes:
      - ..:/app
    networks:
      - backend

networks:
  backend:
    driver: bridge
