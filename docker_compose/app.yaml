version: '3.9'

services:
  main-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: main-app
    ports:
      - "${API_PORT}:8000"
    command: "uvicorn app.server.main:app --reload --host 0.0.0.0 --port 8000"
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/
    volumes:
      - ../app/:/app/
    networks:
      - backend

networks:
  backend:
    external: true
    name: bestmessenger_backend